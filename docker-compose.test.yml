# Postgres apenas para testes de integração (Vitest).
# Uso: npm run integration:db:up  (ou docker compose -f docker-compose.test.yml up -d)
#
# Porta host 5433 evita conflito com um Postgres local na 5432.
# URL padrão: postgresql://postgres:postgres@127.0.0.1:5433/carros_na_cidade_test
# Ver: docs/testing/integration-ads.md
services:
  postgres_test:
    image: postgres:16-alpine
    container_name: carros-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: carros_na_cidade_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d carros_na_cidade_test"]
      interval: 3s
      timeout: 5s
      retries: 10
