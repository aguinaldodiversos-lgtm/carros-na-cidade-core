<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Planos">
  <defs>
    <linearGradient id="planos-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="55%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
  </defs>

  <!-- Fundo branco do círculo (mesmo padrão dos PNGs irmãos: glifo em navy sobre branco) -->
  <circle cx="120" cy="120" r="86" fill="#ffffff" />

  <!-- Anel gradiente exterior (espessura ~7) -->
  <circle cx="120" cy="120" r="86" fill="none" stroke="url(#planos-ring)" stroke-width="7" />

  <!-- Glifo central: estrela "premium" em navy dark, alinhado ao tom dos demais ícones -->
  <g transform="translate(120 120)" fill="#1d2538">
    <path d="
      M 0 -42
      L 12 -13
      L 43 -10
      L 19 10
      L 26 41
      L 0 24
      L -26 41
      L -19 10
      L -43 -10
      L -12 -13
      Z
    " />
    <!-- Pequeno brilho diagonal (sutil), reforça leitura como 'destaque' -->
    <path d="M -26 -22 L -10 -38 L -8 -34 L -24 -18 Z" opacity="0.18" />
  </g>
</svg>
