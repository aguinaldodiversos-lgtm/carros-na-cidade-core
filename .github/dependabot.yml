# Dependabot — alinhamento contínuo com npm (raiz + frontend).
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 8
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 8
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
