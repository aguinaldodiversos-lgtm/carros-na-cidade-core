name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (lint + test + contract audit)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: ESLint (backend)
        run: npm run lint

      - name: Unit tests (backend)
        run: npm test

      - name: Contract audit (BFF ↔ Express)
        run: npm run audit:contract

      - name: Job summary
        if: success()
        run: echo "### Backend checks passed" >> "$GITHUB_STEP_SUMMARY"

  integration-ads:
    name: Integration (ads + Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: carros_na_cidade_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d carros_na_cidade_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/carros_na_cidade_test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/carros_na_cidade_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Integration tests (ads + DB)
        run: npm run ci:integration-ads

      - name: Job summary
        if: success()
        run: echo "### Integration (ads) passed" >> "$GITHUB_STEP_SUMMARY"

  frontend:
    name: Frontend (lint + typecheck + test + build)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint (frontend)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm run test

      - name: Next.js build
        run: npm run build

      - name: Job summary
        if: success()
        run: echo "### Frontend checks passed" >> "$GITHUB_STEP_SUMMARY"
