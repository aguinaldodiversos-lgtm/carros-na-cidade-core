services:
  - type: web
    name: carros-na-cidade-portal
    runtime: node
    rootDir: frontend
    buildCommand: npm ci --include=dev --no-audit --no-fund && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: NEXT_PUBLIC_API_URL
        value: https://carros-na-cidade-core.onrender.com
      - key: BACKEND_API_URL
        value: https://carros-na-cidade-core.onrender.com
