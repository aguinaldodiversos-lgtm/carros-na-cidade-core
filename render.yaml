services:
  - type: web
    name: carros-na-cidade-portal
    runtime: node
    rootDir: frontend
    buildCommand: npm ci --include=dev --no-audit --no-fund && npm run build && mkdir -p .next/standalone/.next && cp -r public .next/standalone/ && cp -r .next/static .next/standalone/.next/
    startCommand: node .next/standalone/server.js
